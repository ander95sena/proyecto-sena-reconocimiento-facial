site_name: Sistema de Reconocimiento Facial

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true

nav:
